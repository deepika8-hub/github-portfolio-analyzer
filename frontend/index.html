<!DOCTYPE html>
<html>
<head>
    <title>GitHub Portfolio Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>GitHub Portfolio Analyzer</h1>
     <p style="color:#6b7280; margin-top:-15px;">
